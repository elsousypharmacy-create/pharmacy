<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM صيدلية السوسي</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Tajawal', sans-serif; background: #0F1E2E; color: #e2e8f0; min-height: 100vh; padding: 12px; direction: rtl; }

  .header { background: linear-gradient(135deg, #1A2F4A, #0D3D50); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .header-top h1 { font-size: 17px; font-weight: 800; color: #f1f5f9; }
  .header-top p { font-size: 10px; color: #64748b; margin-top: 3px; }
  .sync-btn { background: #0D7A8A; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }

  .stats-bar { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 12px; }
  .stat-pill { background: #0F1E2E; border-radius: 8px; padding: 8px 4px; text-align: center; cursor: pointer; border: 2px solid transparent; }
  .stat-pill.active { border-color: #0D7A8A; }
  .stat-pill .lbl { font-size: 15px; font-weight: 900; }
  .stat-pill .cnt { font-size: 10px; color: #64748b; margin-top: 2px; }

  .controls { display: flex; gap: 8px; }
  .search-input { flex: 1; background: #0F1E2E; border: 1px solid #1e3a4a; color: #e2e8f0; border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: inherit; }
  .search-input::placeholder { color: #475569; }
  .filter-btn { background: #0F1E2E; border: 1px solid #1e3a4a; color: #64748b; border-radius: 8px; padding: 9px 12px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .filter-btn.active { background: #0D7A8A; border-color: #0D7A8A; color: #fff; }

  .customer-card { background: #1A2F4A; border-radius: 12px; overflow: hidden; margin-bottom: 12px; border: 1px solid #1e3a4a; }
  .customer-card.alert { border-right: 3px solid #E74C3C; }

  .card-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e3a4a; }
  .customer-info .name { font-size: 16px; font-weight: 800; color: #f1f5f9; }
  .customer-info .phone { font-size: 12px; color: #64748b; margin-top: 3px; }

  .class-badge { padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 900; }
  .cls-S { background: #FFD700; color: #7B6000; }
  .cls-A { background: #C0E8FF; color: #0D4A6E; }
  .cls-B { background: #D4EDDA; color: #155724; }
  .cls-C { background: #FFF3CD; color: #856404; }
  .cls-X { background: #F8D7DA; color: #721C24; }

  .card-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: #1e3a4a; }
  .stat { background: #0F1E2E; padding: 10px; text-align: center; }
  .stat .val { font-size: 16px; font-weight: 700; }
  .stat .lbl { font-size: 9px; color: #64748b; margin-top: 2px; }

  .status-bar { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .status-alert { background: #2D0A0A; border-radius: 8px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; }
  .status-alert .dot { width: 8px; height: 8px; border-radius: 50%; background: #E74C3C; animation: pulse 1s infinite; }
  .status-alert span { font-size: 12px; color: #E74C3C; font-weight: 700; }
  .status-ok { background: #0A2A14; border-radius: 8px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; }
  .status-ok span { font-size: 12px; color: #27AE60; font-weight: 700; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .incentive-badge { background: #0D7A8A; color: #fff; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; }

  .card-actions { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px solid #1e3a4a; }
  .btn-wa { background: #25D366; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; flex: 1; }
  .btn-sms { background: #475569; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; flex: 1; }
  .btn-call { background: #0D7A8A; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; flex: 1; }
  .btn-log { background: #334155; color: #94a3b8; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }

  .card-history { padding: 12px 16px; border-top: 1px solid #1e3a4a; }
  .history-title { font-size: 11px; color: #64748b; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
  .history-empty { font-size: 12px; color: #475569; text-align: center; padding: 8px; }
  .history-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1e3a4a; }
  .history-item:last-child { border-bottom: none; }
  .history-icon { width: 28px; height: 28px; border-radius: 50%; background: #0F1E2E; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .history-content .time { font-size: 10px; color: #64748b; }
  .history-content .text { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .history-content .result { font-size: 11px; margin-top: 3px; font-weight: 600; }
  .result-ok { color: #27AE60; }
  .result-no { color: #E74C3C; }
  .result-mid { color: #F39C12; }

  .modal-overlay { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #1A2F4A; border-radius: 12px; padding: 20px; width: 100%; max-width: 360px; border: 1px solid #1e3a4a; }
  .modal h3 { font-size: 15px; font-weight: 700; color: #f1f5f9; margin-bottom: 14px; }
  .modal select, .modal textarea { width: 100%; background: #0F1E2E; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; padding: 10px; font-size: 13px; font-family: inherit; margin-bottom: 10px; direction: rtl; }
  .modal textarea { height: 80px; resize: none; }
  .modal-btns { display: flex; gap: 8px; }
  .btn-save { background: #0D7A8A; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; flex: 1; }
  .btn-cancel { background: #334155; color: #94a3b8; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; cursor: pointer; font-family: inherit; }

  .loading { text-align: center; padding: 40px; color: #64748b; }
  .spinner { width: 30px; height: 30px; border: 3px solid #1e3a4a; border-top-color: #0D7A8A; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0D7A8A; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 200; display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🏥 CRM صيدلية السوسي</h1>
      <p id="last-sync">جاري التحميل...</p>
    </div>
    <button class="sync-btn" onclick="loadData()">🔄 تحديث</button>
  </div>
  <div class="stats-bar">
    <div class="stat-pill" id="pill-S" onclick="filterCls('S')"><div class="lbl" style="color:#FFD700">S</div><div class="cnt" id="cnt-S">0</div></div>
    <div class="stat-pill" id="pill-A" onclick="filterCls('A')"><div class="lbl" style="color:#0D7A8A">A</div><div class="cnt" id="cnt-A">0</div></div>
    <div class="stat-pill" id="pill-B" onclick="filterCls('B')"><div class="lbl" style="color:#27AE60">B</div><div class="cnt" id="cnt-B">0</div></div>
    <div class="stat-pill" id="pill-C" onclick="filterCls('C')"><div class="lbl" style="color:#F39C12">C</div><div class="cnt" id="cnt-C">0</div></div>
    <div class="stat-pill" id="pill-X" onclick="filterCls('X')"><div class="lbl" style="color:#E74C3C">X</div><div class="cnt" id="cnt-X">0</div></div>
  </div>
  <div class="controls">
    <input class="search-input" type="text" placeholder="🔍 ابحث باسم أو رقم..." oninput="search(this.value)">
    <button class="filter-btn active" id="f-all" onclick="filterStatus('all')">الكل</button>
    <button class="filter-btn" id="f-alert" onclick="filterStatus('alert')">🔴 تنبيه</button>
  </div>
</div>

<div id="list">
  <div class="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">تسجيل تواصل</h3>
    <select id="log-type">
      <option value="wa">واتساب</option>
      <option value="call">اتصال تليفون</option>
      <option value="sms">رسالة SMS</option>
      <option value="note">ملاحظة</option>
    </select>
    <select id="log-result">
      <option value="">النتيجة</option>
      <option value="bought">اشترى ✅</option>
      <option value="answered">رد وهيجي</option>
      <option value="later">رد وقال بعدين</option>
      <option value="no_answer">ما ردش</option>
      <option value="refused">رفض</option>
    </select>
    <textarea id="log-note" placeholder="ملاحظة إضافية (اختياري)"></textarea>
    <div class="modal-btns">
      <button class="btn-save" onclick="saveLog()">حفظ</button>
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPrGl1REbHdvbF4oBspeuh24FZ3nX117iyhr2WJs9IQfsdKckj51DEQUqoR3tR2AUAQA/exec';
var allCustomers = [], histories = {};
var filterCls_ = '', filterStatus_ = 'all', searchStr_ = '';
var logPhone = '', logName = '';

function loadData() {
  document.getElementById('list').innerHTML = '<div class="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>';
  fetch(SCRIPT_URL + '?action=getCustomers')
    .then(function(r){ return r.json(); })
    .then(function(data){
      allCustomers = data.map(function(c){
        return Object.assign({}, c, {isAlert: parseInt(c.days_since) > parseInt(c.alert_days)});
      });
      updateCounts();
      renderList();
      document.getElementById('last-sync').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-EG');
      showToast('تم تحميل ' + allCustomers.length + ' عميل');
    })
    .catch(function(){
      document.getElementById('list').innerHTML = '<div class="loading"><p style="color:#E74C3C">خطأ في التحميل — اضغط تحديث</p></div>';
    });
}

function updateCounts() {
  ['S','A','B','C','X'].forEach(function(c){
    document.getElementById('cnt-'+c).textContent = allCustomers.filter(function(x){return x.cls===c;}).length;
  });
}

function getFiltered() {
  return allCustomers.filter(function(c){
    if (filterCls_ && c.cls !== filterCls_) return false;
    if (filterStatus_ === 'alert' && !c.isAlert) return false;
    if (searchStr_ && c.name.indexOf(searchStr_) < 0 && String(c.phone).indexOf(searchStr_) < 0) return false;
    return true;
  }).sort(function(a,b){ return (b.isAlert?1:0)-(a.isAlert?1:0); });
}

function renderList() {
  var list = getFiltered();
  var el = document.getElementById('list');
  if (!list.length) { el.innerHTML = '<div class="loading"><p style="color:#64748b">لا يوجد عملاء</p></div>'; return; }
  el.innerHTML = list.map(function(c){ return cardHTML(c); }).join('');
  // Load history for each
  list.forEach(function(c){ loadHistory(c.phone); });
}

function cardHTML(c) {
  var statusHTML = c.isAlert
    ? '<div class="status-alert"><div class="dot"></div><span>تنبيه — تجاوز ' + c.alert_days + ' يوم</span></div>'
    : '<div class="status-ok"><span>✅ نشط</span></div>';

  return '<div class="customer-card ' + (c.isAlert?'alert':'') + '">' +
    '<div class="card-header">' +
      '<div class="customer-info">' +
        '<div class="name">' + c.name + '</div>' +
        '<div class="phone">' + c.phone + '</div>' +
      '</div>' +
      '<div class="class-badge cls-' + c.cls + '">' + c.cls + '</div>' +
    '</div>' +
    '<div class="card-stats">' +
      '<div class="stat"><div class="val" style="color:#0D7A8A">' + c.monthly_visits + '</div><div class="lbl">زيارات/شهر</div></div>' +
      '<div class="stat"><div class="val" style="color:#F39C12">' + Number(c.monthly_spend||0).toLocaleString() + ' ج</div><div class="lbl">إنفاق/شهر</div></div>' +
      '<div class="stat"><div class="val" style="color:' + (c.isAlert?'#E74C3C':'#27AE60') + '">' + c.days_since + ' يوم</div><div class="lbl">آخر زيارة</div></div>' +
      '<div class="stat"><div class="val" style="color:#27AE60">' + c.incentive + ' ج</div><div class="lbl">الحافز</div></div>' +
    '</div>' +
    '<div class="status-bar">' +
      statusHTML +
      '<div class="incentive-badge">كوبون ' + c.incentive + ' ج</div>' +
    '</div>' +
    '<div class="card-actions">' +
      '<button class="btn-wa" onclick="doWA(\'' + c.phone + '\',\'' + c.name + '\',\'' + c.incentive + '\')">💬 واتساب</button>' +
      '<button class="btn-sms" onclick="doSMS(\'' + c.phone + '\',\'' + c.name + '\',\'' + c.incentive + '\')">📱 SMS</button>' +
      '<button class="btn-call" onclick="doCall(\'' + c.phone + '\',\'' + c.name + '\')">📞 اتصال</button>' +
      '<button class="btn-log" onclick="openLog(\'' + c.phone + '\',\'' + c.name + '\')">📝</button>' +
    '</div>' +
    '<div class="card-history">' +
      '<div class="history-title">سجل التواصل</div>' +
      '<div id="history-' + c.phone + '" class="history-empty">لا يوجد تواصل سابق</div>' +
    '</div>' +
  '</div>';
}

function doWA(phone, name, coupon) {
  var msg = encodeURIComponent('السلام عليكم يا ' + name + '\nصيدلية د. احمد السوسي بتبعتلك هدية خاصة\nكوبون خصم ' + coupon + ' جنيه على اول طلب توصيل\nصالح 3 ايام بس\nاتصل او ابعت: 01143404023');
  window.open('https://wa.me/2' + phone + '?text=' + msg, '_blank');
  addHistory(phone, name, 'wa', 'تم إرسال واتساب', '');
}
function doSMS(phone, name, coupon) {
  var msg = encodeURIComponent('صيدلية السوسي: هدية لحضرتك يا ' + name + ' - كوبون خصم ' + coupon + 'ج على التوصيل - 01143404023');
  window.open('sms:0' + phone + '?&body=' + msg, '_blank');
  addHistory(phone, name, 'sms', 'تم إرسال SMS', '');
}
function doCall(phone, name) {
  window.open('tel:0' + phone);
  addHistory(phone, name, 'call', 'تم الاتصال', '');
}

function openLog(phone, name) {
  logPhone = phone; logName = name;
  document.getElementById('modal-title').textContent = 'تسجيل تواصل — ' + name;
  document.getElementById('log-result').value = '';
  document.getElementById('log-note').value = '';
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function saveLog() {
  var type = document.getElementById('log-type').value;
  var result = document.getElementById('log-result').value;
  var note = document.getElementById('log-note').value;
  addHistory(logPhone, logName, type, note || getResultText(result), result);
  closeModal();
  showToast('تم التسجيل');
}
function getResultText(r) {
  var t = {answered:'رد وهيجي', later:'رد وقال بعدين', no_answer:'ما ردش', bought:'اشترى ✅', refused:'رفض'};
  return t[r] || '—';
}

function addHistory(phone, name, type, text, result) {
  var container = document.getElementById('history-' + phone);
  if (container) {
    var empty = container.querySelector('.history-empty');
    if (empty) empty.remove();
    var icons = {wa:'💬', call:'📞', sms:'📱', note:'📝'};
    var timeStr = new Date().toLocaleString('ar-EG', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    var resultClass = result==='bought'?'result-ok':(result==='refused'||result==='no_answer')?'result-no':'result-mid';
    var resultText = result ? getResultText(result) : '';
    var item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = '<div class="history-icon">' + (icons[type]||'📝') + '</div>' +
      '<div class="history-content"><div class="time">' + timeStr + '</div>' +
      '<div class="text">' + text + '</div>' +
      (resultText ? '<div class="result ' + resultClass + '">' + resultText + '</div>' : '') +
      '</div>';
    container.insertBefore(item, container.firstChild);
  }
  saveToSheet(phone, name, type, text, result, '');
}

function loadHistory(phone) {
  fetch(SCRIPT_URL + '?action=getHistory&phone=' + phone)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!Array.isArray(data) || !data.length) return;
      var container = document.getElementById('history-' + phone);
      if (!container) return;
      var empty = container.querySelector('.history-empty');
      if (empty) empty.remove();
      var icons = {wa:'💬', call:'📞', sms:'📱', note:'📝'};
      container.innerHTML = data.slice(0,5).map(function(h){
        var rc = h.result==='اشترى ✅'||h.result==='رد وهيجي'?'result-ok':h.result==='ما ردش'||h.result==='رفض'?'result-no':'result-mid';
        var timeStr = fmtDate(h.timestamp);
        return '<div class="history-item"><div class="history-icon">' + (icons[h.type]||'📝') + '</div>' +
          '<div class="history-content"><div class="time">' + timeStr + '</div>' +
          '<div class="text">' + (h.text||'') + '</div>' +
          (h.result ? '<div class="result ' + rc + '">' + h.result + '</div>' : '') +
          '</div></div>';
      }).join('');
    }).catch(function(){});
}

function fmtDate(ts) {
  if (!ts) return '—';
  try { return new Date(ts).toLocaleDateString('ar-EG', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return ts; }
}

function saveToSheet(phone, name, type, text, result, note) {
  fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'log', phone:phone, name:name, type:type, text:text, result:result, note:note})
  }).catch(function(){});
}

function filterCls(cls) {
  filterCls_ = filterCls_===cls?'':cls;
  document.querySelectorAll('.stat-pill').forEach(function(p){ p.classList.remove('active'); });
  if (filterCls_) document.getElementById('pill-'+filterCls_).classList.add('active');
  renderList();
}
function filterStatus(s) {
  filterStatus_ = s;
  document.getElementById('f-all').classList.toggle('active', s==='all');
  document.getElementById('f-alert').classList.toggle('active', s==='alert');
  renderList();
}
function search(v) { searchStr_ = v; renderList(); }

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2500);
}

loadData();
</script>
</body>
</html>
